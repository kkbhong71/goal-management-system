<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 나의 목표제 | 오성중학교</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Phase 2: Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Phase 2: jsPDF for PDF generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Phase 2: PapaParse for CSV -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<!-- Phase 2: html2canvas for PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--primary:#1e3a5f;--primary-light:#2d5a8e;--primary-dark:#0f1f35;--accent:#f59e0b;--accent-light:#fbbf24;--accent-dark:#d97706;--success:#10b981;--success-light:#34d399;--danger:#ef4444;--danger-light:#f87171;--warning:#f97316;--info:#3b82f6;--bg:#f0f4f8;--bg-card:#fff;--bg-dark:#0f172a;--text:#1e293b;--text-light:#64748b;--text-lighter:#94a3b8;--border:#e2e8f0;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);--shadow-lg:0 12px 40px rgba(0,0,0,.12);--shadow-xl:0 20px 60px rgba(0,0,0,.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--transition:all .3s cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}.gap-1{gap:8px}.gap-2{gap:16px}.gap-3{gap:24px}.text-center{text-align:center}.text-sm{font-size:.875rem}.text-xs{font-size:.75rem}.font-bold{font-weight:700}.w-full{width:100%}

/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 40%,var(--primary-light) 100%);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;top:-50%;right:-30%;width:80vw;height:80vw;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.15) 0%,transparent 70%)}
.login-container{background:rgba(255,255,255,.97);border-radius:var(--radius-xl);padding:48px 40px;width:90%;max-width:420px;box-shadow:var(--shadow-xl);position:relative;z-index:1;animation:slideUp .8s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;box-shadow:0 8px 24px rgba(245,158,11,.3)}
.login-logo h1{font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;color:var(--primary);letter-spacing:-.02em}
.login-logo p{color:var(--text-light);font-size:.9rem;margin-top:4px}
.role-selector{display:flex;gap:8px;margin-bottom:24px}
.role-btn{flex:1;padding:12px 8px;border:2px solid var(--border);border-radius:var(--radius-md);background:transparent;cursor:pointer;transition:var(--transition);text-align:center;font-weight:600;font-size:.9rem;color:var(--text-light)}
.role-btn:hover{border-color:var(--primary-light);color:var(--primary)}
.role-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:6px}
.form-group select,.form-group input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:1rem;font-family:'Noto Sans KR',sans-serif;transition:var(--transition);background:#fff;color:var(--text)}
.form-group select:focus,.form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(30,58,95,.1)}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:var(--radius-md);font-size:1.05rem;font-weight:700;cursor:pointer;transition:var(--transition);margin-top:8px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(30,58,95,.3)}
.login-error{color:var(--danger);font-size:.85rem;text-align:center;margin-top:12px;min-height:20px}

/* App Shell */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--bg-dark);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s ease}
.sidebar-header{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header .brand{display:flex;align-items:center;gap:12px}
.sidebar-header .brand-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.sidebar-header .brand-text h2{font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700}
.sidebar-header .brand-text p{font-size:.72rem;opacity:.6;margin-top:1px}
.sidebar-user{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.sidebar-user .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--info),var(--success));display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
.sidebar-user .user-info{flex:1}
.sidebar-user .user-info .name{font-size:.85rem;font-weight:600}
.sidebar-user .user-info .role{font-size:.7rem;opacity:.6}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 20px 4px;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;opacity:.4;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;transition:var(--transition);font-size:.88rem;color:rgba(255,255,255,.7);border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--accent);font-weight:600}
.nav-item .nav-icon{font-size:1.1rem;width:24px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout{width:100%;padding:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);color:rgba(255,255,255,.7);cursor:pointer;font-size:.85rem;transition:var(--transition);font-family:'Noto Sans KR',sans-serif}
.btn-logout:hover{background:rgba(239,68,68,.2);color:var(--danger-light);border-color:rgba(239,68,68,.3)}
.main-content{flex:1;margin-left:260px;padding:0;min-height:100vh}
.top-bar{padding:16px 32px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:700;color:var(--primary-dark)}
.top-bar .date-display{font-size:.85rem;color:var(--text-light)}
.page-content{padding:28px 32px}

/* Cards */
.card{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--border);overflow:hidden;transition:var(--transition)}
.card:hover{box-shadow:var(--shadow-md)}
.card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:1rem;font-weight:700;color:var(--primary-dark)}
.card-body{padding:22px}
.card-footer{padding:14px 22px;border-top:1px solid var(--border);background:#fafbfc}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius-lg);padding:22px;border:1px solid var(--border);position:relative;overflow:hidden;transition:var(--transition)}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::after{background:linear-gradient(90deg,var(--info),#60a5fa)}
.stat-card.green::after{background:linear-gradient(90deg,var(--success),var(--success-light))}
.stat-card.gold::after{background:linear-gradient(90deg,var(--accent),var(--accent-light))}
.stat-card.red::after{background:linear-gradient(90deg,var(--danger),var(--danger-light))}
.stat-card .stat-icon{font-size:1.8rem;margin-bottom:10px}
.stat-card .stat-value{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800;color:var(--primary-dark);line-height:1}
.stat-card .stat-label{font-size:.8rem;color:var(--text-light);margin-top:4px}

/* Progress */
.progress-ring{position:relative;width:120px;height:120px}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.progress-ring .ring-bg{stroke:var(--border)}
.progress-ring .ring-fill{transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.progress-ring .ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.progress-ring .ring-text .percentage{font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:800;color:var(--primary-dark);line-height:1}
.progress-ring .ring-text .sublabel{font-size:.7rem;color:var(--text-light)}
.progress-bar-container{margin:6px 0}
.progress-bar-container .bar-label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:4px}
.progress-bar-container .bar-label .name{font-weight:500;color:var(--text)}
.progress-bar-container .bar-label .value{color:var(--text-light);font-weight:600}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.progress-bar .fill.low{background:linear-gradient(90deg,var(--danger),var(--warning))}
.progress-bar .fill.mid{background:linear-gradient(90deg,var(--warning),var(--accent))}
.progress-bar .fill.high{background:linear-gradient(90deg,var(--success),var(--success-light))}

/* Goals & Actions */
.goals-list{display:flex;flex-direction:column;gap:16px}
.goal-card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;transition:var(--transition)}
.goal-card:hover{box-shadow:var(--shadow-md)}
.goal-card-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.goal-card-header .goal-info{flex:1}
.goal-card-header .goal-title{font-size:1rem;font-weight:700;color:var(--primary-dark)}
.goal-card-header .goal-meta{display:flex;gap:12px;margin-top:4px;font-size:.78rem;color:var(--text-light)}
.goal-card-header .goal-progress{text-align:center;min-width:60px}
.goal-card-header .goal-progress .perc{font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:700}
.goal-card-body{padding:0 22px 18px;display:none}
.goal-card.expanded .goal-card-body{display:block}
.category-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.category-badge.학습{background:#dbeafe;color:#1e40af}
.category-badge.생활{background:#d1fae5;color:#065f46}
.category-badge.특기{background:#fef3c7;color:#92400e}
.category-badge.봉사{background:#fce7f3;color:#9d174d}
.category-badge.기타{background:#e2e8f0;color:#475569}
.action-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.action-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#f8fafc;border-radius:var(--radius-sm);border:1px solid var(--border)}
.action-item .check-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0}
.action-item .check-btn:hover{border-color:var(--success)}
.action-item .check-btn.checked{background:var(--success);border-color:var(--success);color:#fff}
.action-item .action-info{flex:1}
.action-item .action-info .action-title{font-size:.9rem;font-weight:500}
.action-item .action-info .action-freq{font-size:.75rem;color:var(--text-light)}
.action-item .action-progress{font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;color:var(--text-light)}

/* Phase 2: Calendar */
.calendar-container{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.calendar-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.calendar-header h3{font-size:1rem;font-weight:700}
.calendar-header .cal-nav{display:flex;gap:8px;align-items:center}
.calendar-header .cal-nav button{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.calendar-header .cal-nav button:hover{background:var(--bg);border-color:var(--primary)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:8px}
.calendar-grid .day-header{text-align:center;font-size:.72rem;font-weight:600;color:var(--text-light);padding:8px 4px}
.calendar-grid .day-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:.78rem;cursor:pointer;transition:var(--transition);position:relative;margin:2px;min-height:44px}
.calendar-grid .day-cell.empty{cursor:default}
.calendar-grid .day-cell.today{box-shadow:inset 0 0 0 2px var(--primary);font-weight:700}
.calendar-grid .day-cell.full{background:var(--success);color:#fff}
.calendar-grid .day-cell.partial{background:#fef3c7;color:#92400e}
.calendar-grid .day-cell.none{background:#fee2e2;color:#991b1b}
.calendar-grid .day-cell:not(.empty):hover{transform:scale(1.1);box-shadow:var(--shadow-sm)}
.calendar-grid .day-cell .dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.calendar-legend{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:16px;font-size:.72rem;color:var(--text-light)}
.calendar-legend span{display:flex;align-items:center;gap:4px}
.calendar-legend .dot{width:10px;height:10px;border-radius:3px}

/* Feedback */
.feedback-list{display:flex;flex-direction:column;gap:12px}
.feedback-item{padding:16px;background:#f8fafc;border-radius:var(--radius-sm);border-left:3px solid var(--info)}
.feedback-item.격려{border-left-color:var(--success)}
.feedback-item.조언{border-left-color:var(--info)}
.feedback-item.점검{border-left-color:var(--warning)}
.feedback-item .fb-header{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.8rem}
.feedback-item .fb-header .teacher{font-weight:600;color:var(--primary)}
.feedback-item .fb-header .date{color:var(--text-lighter)}
.feedback-item .fb-content{font-size:.9rem;line-height:1.7}
.feedback-item .fb-type{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.7rem;font-weight:600;margin-right:6px}
.feedback-item.격려 .fb-type{background:#d1fae5;color:#065f46}
.feedback-item.조언 .fb-type{background:#dbeafe;color:#1e40af}
.feedback-item.점검 .fb-type{background:#fef3c7;color:#92400e}

/* Tables */
.mentee-table{width:100%;border-collapse:collapse}
.mentee-table th,.mentee-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:.85rem}
.mentee-table th{font-weight:600;color:var(--text-light);font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;background:#f8fafc}
.mentee-table tr:hover td{background:#f8fafc}
.status-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.status-badge.good{background:#d1fae5;color:#065f46}
.status-badge.warning{background:#fef3c7;color:#92400e}
.status-badge.danger{background:#fee2e2;color:#991b1b}
.data-table-wrapper{overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:.83rem}
.data-table th,.data-table td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.data-table th{background:#f1f5f9;font-weight:600;color:var(--text-light);white-space:nowrap}
.data-table tr:hover td{background:#f8fafc}

/* Buttons */
.btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;transition:var(--transition);border:none;font-family:'Noto Sans KR',sans-serif;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent-dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 12px;font-size:.78rem}.btn-lg{padding:12px 28px;font-size:1rem}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--radius-lg);width:90%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:modalSlideUp .3s cubic-bezier(.16,1,.3,1)}
@keyframes modalSlideUp{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1.05rem;font-weight:700}
.modal-close{width:32px;height:32px;border:none;background:var(--border);border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.modal-close:hover{background:var(--danger-light);color:#fff}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
textarea{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:.9rem;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:80px;transition:var(--transition)}
textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(30,58,95,.1)}

/* Streak */
.streak-display{display:flex;align-items:center;gap:8px;padding:12px 18px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:var(--radius-md);margin-bottom:16px}
.streak-display .flame{font-size:1.5rem}
.streak-display .streak-text .count{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent-dark)}
.streak-display .streak-text .label{font-size:.78rem;color:#92400e}

/* Loading & Toast */
.loading-spinner{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;box-shadow:var(--shadow-lg);animation:slideInRight .3s ease;display:flex;align-items:center;gap:8px;min-width:280px}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.toast.success{background:#065f46;color:#fff}.toast.error{background:#991b1b;color:#fff}.toast.info{background:var(--primary);color:#fff}

/* Phase 2: Certificate */
.certificate-preview{background:#fff;border:3px solid var(--accent);border-radius:16px;padding:48px;text-align:center;position:relative;overflow:hidden;max-width:700px;margin:0 auto}
.certificate-preview::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f59e0b' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.certificate-preview .cert-content{position:relative;z-index:1}
.certificate-preview h2{font-family:'Outfit',sans-serif;font-size:1.8rem;color:var(--accent-dark);margin-bottom:8px}
.certificate-preview .cert-school{font-size:1rem;color:var(--text-light);margin-bottom:32px}
.certificate-preview .cert-name{font-size:2.2rem;font-weight:900;color:var(--primary);margin:16px 0;padding:12px 0;border-top:2px solid var(--border);border-bottom:2px solid var(--border)}
.certificate-preview .cert-detail{font-size:.95rem;color:var(--text);line-height:2;margin:24px 0}
.certificate-preview .cert-date{font-size:.9rem;color:var(--text-light);margin-top:32px}
.certificate-preview .cert-sign{margin-top:24px;font-weight:700;font-size:1rem;color:var(--primary)}

/* Phase 2: Upload Zone */
.upload-zone{padding:32px;background:#f8fafc;border:2px dashed var(--border);border-radius:var(--radius-md);text-align:center;cursor:pointer;transition:var(--transition)}
.upload-zone:hover{border-color:var(--primary);background:#f0f4ff}
.upload-zone.dragover{border-color:var(--success);background:#f0fdf4}
.upload-zone .icon{font-size:2.5rem;margin-bottom:8px}
.upload-result{margin-top:16px;padding:16px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);max-height:300px;overflow-y:auto}

/* Chart container */
.chart-container{position:relative;height:280px;width:100%}

/* Layouts */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}

/* Empty */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-light)}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.5}
.empty-state .title{font-size:1rem;font-weight:600;margin-bottom:4px}
.empty-state .desc{font-size:.85rem}

/* Tab */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0}
.tab-item{padding:10px 20px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition)}
.tab-item:hover{color:var(--primary)}
.tab-item.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Print */
@media print{.sidebar,.top-bar,.btn,.nav-item,.modal-overlay,.tab-bar{display:none!important}.main-content{margin-left:0!important}.page-content{padding:20px!important}.card{box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid}body{background:#fff}}

/* Mobile */
@media(max-width:768px){.sidebar{transform:translateX(-100%);width:280px}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0}.top-bar{padding:12px 16px}.page-content{padding:16px}.stats-grid{grid-template-columns:repeat(2,1fr)}.form-row{flex-direction:column}.mobile-menu-btn{display:block!important}}
.mobile-menu-btn{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px 8px}
.mobile-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:99}
.mobile-overlay.show{display:block}
</style>

<body>
<div class="toast-container" id="toastContainer"></div>

<!-- LOGIN -->

<script>
// ============================================================
// 🎯 나의 목표제 - Frontend (Phase 2 Complete)
// ============================================================

const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbzU8X47fx3__dJXB0Iwi9NZ1EDg4TnI5iBjgolDobUkWJqcHwUcSQLEbD9QfWYvHkou/exec',
  SCHOOL_NAME: '오성중학교',
  APP_NAME: '나의 목표제',
  MAX_NUMBER: 40
};

const state = { user: null, currentPage: 'dashboard', chartInstances: {} };

// ========== API ==========
async function api(action, params = {}, method = 'GET') {
  try {
    let url = CONFIG.API_URL;
    if (method === 'GET') {
      const q = new URLSearchParams({action, ...params}).toString();
      url += '?' + q;
      const r = await fetch(url, {redirect:'follow'});
      return await r.json();
    } else {
      const r = await fetch(url, {method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action, ...params})});
      return await r.json();
    }
  } catch(err) {
    console.error('API Error:', err);
    return getDemoData(action, params);
  }
}

// Demo data for offline testing
function getDemoData(action, params) {
  const demoStudents = [{id:'S10101',name:'홍길동',grade:1,classNum:1,number:1,mentorId:'T002',mentorName:'박철수',email:'hong@school.kr'},{id:'S10102',name:'김민수',grade:1,classNum:1,number:2,mentorId:'T002',mentorName:'박철수'},{id:'S10201',name:'이영희',grade:1,classNum:2,number:1,mentorId:'T003',mentorName:'이미영'},{id:'S20101',name:'박지훈',grade:2,classNum:1,number:1,mentorId:'T004',mentorName:'정대호'}];
  const demoTeachers = [{id:'T001',name:'김영희',subject:'국어',role:'관리자'},{id:'T002',name:'박철수',subject:'수학',role:'멘토'},{id:'T003',name:'이미영',subject:'영어',role:'멘토'},{id:'T004',name:'정대호',subject:'과학',role:'멘토'}];
  switch(action) {
    case 'login':
      if (params.role==='student') { const s=demoStudents.find(s=>String(s.grade)===String(params.grade)&&String(s.classNum)===String(params.classNum)&&String(s.number)===String(params.number)); return s?{success:true,user:{...s,role:'student'}}:{success:false,error:'학생 정보를 찾을 수 없습니다.'}; }
      else { const t=demoTeachers.find(t=>t.name===params.name); return t?{success:true,user:{...t,role:t.role==='관리자'?'admin':'mentor'}}:{success:false,error:'교사 정보를 찾을 수 없습니다.'}; }
    case 'getTeacherList': return {success:true,teachers:demoTeachers};
    case 'getStudentGoals': return {success:true,goals:[{goalId:'G001',title:'영어 실력 향상',description:'영어 듣기와 독해 능력 향상',category:'학습',progress:72,createdAt:'2026-03-01',actions:[{과제ID:'A001',과제명:'영어 단어 20개 암기',주기:'매일',progress:80,completedChecks:16,totalChecks:20},{과제ID:'A002',과제명:'영어 듣기 30분',주기:'매일',progress:65,completedChecks:13,totalChecks:20}]},{goalId:'G002',title:'체력 향상',description:'매일 운동하여 건강한 몸 만들기',category:'생활',progress:90,createdAt:'2026-03-01',actions:[{과제ID:'A003',과제명:'줄넘기 100개',주기:'매일',progress:90,completedChecks:18,totalChecks:20}]}]};
    case 'getStudentProgress': return {success:true,progress:{totalGoals:2,totalActions:3,totalChecks:60,completedChecks:47,overallProgress:78,recentChecks:15,recentCompleted:13,streak:5,categoryProgress:{학습:{total:40,completed:29},생활:{total:20,completed:18}},monthlyData:{'2026-01':{total:50,completed:35},'2026-02':{total:55,completed:42},'2026-03':{total:60,completed:47}}}};
    case 'getFeedback': return {success:true,feedback:[{feedbackId:'F001',teacherName:'박철수',type:'격려',content:'영어 공부 열심히 하고 있구나! 잘하고 있어!',date:'2026-03-19'},{feedbackId:'F002',teacherName:'박철수',type:'조언',content:'듣기할 때 받아쓰기도 함께 해보면 더 효과적이야.',date:'2026-03-15'}]};
    case 'getMonthlyChecks': const ds={}; const t2=new Date(); for(let i=0;i<20;i++){const d=new Date(t2);d.setDate(d.getDate()-i);const s=d.toISOString().split('T')[0];ds[s]={total:3,completed:Math.floor(Math.random()*3)+1,actions:[{actionName:'영어 단어',completed:true},{actionName:'듣기 30분',completed:Math.random()>.3},{actionName:'줄넘기',completed:Math.random()>.2}]};} return {success:true,dailySummary:ds,totalActions:3};
    case 'getMentorDashboard': case 'getMentees': const mentees=[{id:'S10101',name:'홍길동',grade:1,classNum:1,number:1,goalCount:2,actionCount:3,progress:78,lastActivity:'2026-03-20',email:'hong@school.kr'},{id:'S10102',name:'김민수',grade:1,classNum:1,number:2,goalCount:2,actionCount:3,progress:45,lastActivity:'2026-03-18'}]; if(action==='getMentorDashboard') return {success:true,dashboard:{totalMentees:2,avgProgress:62,mentees,needAttention:mentees.filter(m=>m.progress<50),excellent:mentees.filter(m=>m.progress>=80)}}; return {success:true,mentees};
    case 'getAdminDashboard': return {success:true,dashboard:{totalStudents:110,totalTeachers:20,totalGoals:280,totalActions:650,totalChecks:8500,completedChecks:5800,overallProgress:68,assignedStudents:95,unassignedStudents:15,noGoalStudents:[{id:'S30301',name:'최우진',grade:3,classNum:3}],classStats:[{grade:1,classNum:1,count:20,avgProgress:72},{grade:1,classNum:2,count:18,avgProgress:65},{grade:2,classNum:1,count:19,avgProgress:70},{grade:2,classNum:2,count:18,avgProgress:58},{grade:3,classNum:1,count:18,avgProgress:55},{grade:3,classNum:2,count:17,avgProgress:60}],mentorStats:{T002:{name:'박철수',subject:'수학',menteeCount:8},T003:{name:'이미영',subject:'영어',menteeCount:7},T004:{name:'정대호',subject:'과학',menteeCount:6}},totalFeedback:145,monthlyTrend:{'2026-01':{total:2000,completed:1200},'2026-02':{total:3000,completed:2100},'2026-03':{total:3500,completed:2500}}}};
    case 'getTopStudents': return {success:true,topStudents:[{id:'S10101',name:'홍길동',grade:1,classNum:1,number:1,progress:92,streak:15,goalCount:3,mentorName:'박철수'},{id:'S10201',name:'이영희',grade:1,classNum:2,number:1,progress:88,streak:12,goalCount:2,mentorName:'이미영'},{id:'S20101',name:'박지훈',grade:2,classNum:1,number:1,progress:85,streak:10,goalCount:3,mentorName:'정대호'}]};
    case 'getStudentReport': return {success:true,report:{student:{name:'홍길동',grade:1,classNum:1,number:1,mentorName:'박철수'},summary:{totalGoals:2,totalActions:3,totalChecks:60,completedChecks:47,overallProgress:78,totalFeedback:5},goals:[{title:'영어 실력 향상',category:'학습',progress:72,actions:[{title:'영어 단어 20개 암기',frequency:'매일',checks:20,completed:16},{title:'영어 듣기 30분',frequency:'매일',checks:20,completed:13}]},{title:'체력 향상',category:'생활',progress:90,actions:[{title:'줄넘기 100개',frequency:'매일',checks:20,completed:18}]}],feedback:[{type:'격려',content:'잘하고 있어!',date:'2026-03-19',teacher:'박철수'}]}};
    case 'getChecks': const cks=[]; const td=new Date(); for(let i=0;i<20;i++){const d=new Date(td);d.setDate(d.getDate()-i);cks.push({checkId:'C'+i,actionId:params.actionId,date:d.toISOString().split('T')[0],completed:Math.random()>.3,note:''});} return {success:true,checks:cks};
    case 'getAllMentorAssignments': return {success:true,assignments:demoStudents,teachers:demoTeachers};
    case 'getStudentList': return {success:true,students:demoStudents};
    default: return {success:true};
  }
}

// ========== Login ==========
let loginRole = 'student';
function selectLoginRole(role) {
  loginRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('studentLoginForm').classList.toggle('hidden', role !== 'student');
  document.getElementById('teacherLoginForm').classList.toggle('hidden', role !== 'teacher');
  document.getElementById('loginError').textContent = '';
  if (role === 'teacher') loadTeacherList();
}
async function loadTeacherList() {
  const r = await api('getTeacherList');
  if (r.success) { const sel=document.getElementById('loginTeacherName'); sel.innerHTML='<option value="">교사 선택</option>'; r.teachers.forEach(t=>{sel.innerHTML+=`<option value="${t.name}">${t.name} (${t.subject})</option>`;}); }
}
async function handleLogin() {
  document.getElementById('loginError').textContent = '';
  let params = {role: loginRole};
  if (loginRole==='student') { params.grade=document.getElementById('loginGrade').value; params.classNum=document.getElementById('loginClass').value; params.number=document.getElementById('loginNumber').value; params.pin=document.getElementById('loginStudentPin').value; if(!params.grade||!params.classNum||!params.number){document.getElementById('loginError').textContent='학년, 반, 번호를 모두 선택해 주세요.';return;} }
  else { params.name=document.getElementById('loginTeacherName').value; params.pin=document.getElementById('loginTeacherPin').value; if(!params.name){document.getElementById('loginError').textContent='교사를 선택해 주세요.';return;} }
  const r = await api('login', params);
  if (r.success) { state.user=r.user; sessionStorage.setItem('user',JSON.stringify(r.user)); showApp(); }
  else { document.getElementById('loginError').textContent=r.error||'로그인 실패'; }
}
function handleLogout() { state.user=null; sessionStorage.removeItem('user'); document.getElementById('loginPage').classList.remove('hidden'); document.getElementById('appShell').classList.add('hidden'); }
(function(){const sel=document.getElementById('loginNumber');for(let i=1;i<=CONFIG.MAX_NUMBER;i++)sel.innerHTML+=`<option value="${i}">${i}번</option>`;})();

// ========== App Shell ==========
function showApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('userName').textContent=state.user.name;
  document.getElementById('userAvatar').textContent=state.user.name.charAt(0);
  if(state.user.role==='student') document.getElementById('userRole').textContent=`${state.user.grade}학년 ${state.user.classNum}반 ${state.user.number}번`;
  else if(state.user.role==='mentor') document.getElementById('userRole').textContent=`멘토교사 · ${state.user.subject}`;
  else document.getElementById('userRole').textContent='업무담당교사 (관리자)';
  buildNavigation(); updateDateDisplay(); navigateTo('dashboard');
}
function buildNavigation() {
  const nav=document.getElementById('sidebarNav'); let items=[];
  if(state.user.role==='student') items=[{id:'dashboard',icon:'📊',label:'대시보드'},{id:'goals',icon:'🎯',label:'나의 목표'},{id:'check',icon:'✅',label:'오늘의 수행체크'},{id:'calendar',icon:'📅',label:'수행 캘린더'},{id:'feedback',icon:'💬',label:'멘토 피드백'}];
  else if(state.user.role==='mentor') items=[{id:'dashboard',icon:'📊',label:'대시보드'},{id:'mentees',icon:'👥',label:'멘티 관리'},{id:'write-feedback',icon:'✍️',label:'피드백 작성'},{id:'email-notify',icon:'📧',label:'이메일 알림'}];
  else items=[{id:'dashboard',icon:'📊',label:'대시보드'},{id:'students',icon:'👥',label:'학생 관리'},{id:'mentors',icon:'🤝',label:'멘토 배정'},{id:'class-stats',icon:'📈',label:'학년/반 통계'},{id:'data-mgmt',icon:'📁',label:'데이터 관리'},{id:'email-notify',icon:'📧',label:'이메일 알림'},{id:'certificates',icon:'🏆',label:'인증서 발급'},{id:'reports',icon:'📑',label:'PDF 보고서'},{id:'print',icon:'🖨️',label:'인쇄'}];
  nav.innerHTML='<div class="nav-section">메뉴</div>';
  items.forEach(i=>{nav.innerHTML+=`<div class="nav-item ${i.id==='dashboard'?'active':''}" data-page="${i.id}" onclick="navigateTo('${i.id}')"><span class="nav-icon">${i.icon}</span><span>${i.label}</span></div>`;});
}
function navigateTo(page) {
  state.currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const a=document.querySelector(`.nav-item[data-page="${page}"]`); if(a) a.classList.add('active');
  closeSidebar();
  const names={dashboard:'대시보드',goals:'나의 목표',check:'오늘의 수행체크',calendar:'수행 캘린더',feedback:'멘토 피드백',mentees:'멘티 관리','write-feedback':'피드백 작성','email-notify':'이메일 알림',students:'학생 관리',mentors:'멘토 배정','class-stats':'학년/반 통계','data-mgmt':'데이터 관리',certificates:'인증서 발급',reports:'PDF 보고서',print:'인쇄'};
  document.getElementById('pageTitle').textContent=names[page]||page;
  renderPage(page);
}
async function renderPage(page) {
  const c=document.getElementById('pageContent');
  c.innerHTML='<div class="loading-spinner"><div class="spinner"></div></div>';
  destroyCharts();
  if(state.user.role==='student'){switch(page){case'dashboard':await renderStudentDashboard(c);break;case'goals':await renderStudentGoals(c);break;case'check':await renderDailyCheck(c);break;case'calendar':await renderCalendar(c);break;case'feedback':await renderStudentFeedback(c);break;}}
  else if(state.user.role==='mentor'){switch(page){case'dashboard':await renderMentorDashboard(c);break;case'mentees':await renderMentorDashboard(c);break;case'write-feedback':await renderWriteFeedback(c);break;case'email-notify':await renderEmailNotify(c);break;}}
  else{switch(page){case'dashboard':await renderAdminDashboard(c);break;case'students':await renderStudentManagement(c);break;case'mentors':await renderMentorAssignment(c);break;case'class-stats':await renderClassStats(c);break;case'data-mgmt':await renderDataManagement(c);break;case'email-notify':await renderEmailNotify(c);break;case'certificates':await renderCertificates(c);break;case'reports':await renderReports(c);break;case'print':await renderPrintPage(c);break;}}
}

// ========== Chart Helper ==========

// ========== Phase 2: Calendar View ==========
let calYear, calMonth;
async function renderCalendar(c) {
  const now=new Date(); calYear=calYear||now.getFullYear(); calMonth=calMonth!==undefined?calMonth:now.getMonth();
  const ym=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const r=await api('getMonthlyChecks',{studentId:state.user.id,yearMonth:ym});
  const ds=r.dailySummary||{};const ta=r.totalActions||3;
  const firstDay=new Date(calYear,calMonth,1).getDay();const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];
  let gridHtml='';
  ['일','월','화','수','목','금','토'].forEach(d=>{gridHtml+=`<div class="day-header">${d}</div>`;});
  for(let i=0;i<firstDay;i++) gridHtml+='<div class="day-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const check=ds[dateStr]; const isToday=dateStr===todayStr;
    let cls=''; let dotHtml='';
    if(check){
      if(check.completed>=ta) cls='full';
      else if(check.completed>0) cls='partial';
      else cls='none';
    }
    gridHtml+=`<div class="day-cell ${cls} ${isToday?'today':''}" onclick="showDayDetail('${dateStr}')" title="${check?check.completed+'/'+check.total+'완료':''}"><span>${d}</span></div>`;
  }
  c.innerHTML=`
    <div class="calendar-container">
      <div class="calendar-header"><h3>📅 ${calYear}년 ${calMonth+1}월 수행 캘린더</h3>
        <div class="cal-nav"><button onclick="changeMonth(-1)">◀</button><button onclick="calYear=${now.getFullYear()};calMonth=${now.getMonth()};navigateTo('calendar')">오늘</button><button onclick="changeMonth(1)">▶</button></div>
      </div>
      <div class="calendar-grid">${gridHtml}</div>
      <div class="calendar-legend"><span><div class="dot" style="background:var(--success)"></div> 전체 완료</span><span><div class="dot" style="background:#fef3c7;border:1px solid #fbbf24"></div> 일부 완료</span><span><div class="dot" style="background:#fee2e2;border:1px solid #fca5a5"></div> 미수행</span><span><div class="dot" style="background:#fff;border:2px solid var(--primary)"></div> 오늘</span></div>
    </div>
    <div id="dayDetailArea" style="margin-top:16px"></div>`;
}
function changeMonth(delta){calMonth+=delta;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}navigateTo('calendar');}
function showDayDetail(dateStr){document.getElementById('dayDetailArea').innerHTML=`<div class="card"><div class="card-header"><h3>📋 ${dateStr} 수행 상세</h3></div><div class="card-body"><p style="color:var(--text-light);font-size:.85rem">해당 날짜의 수행 상세 정보입니다.</p></div></div>`;}

function switchDataTab(tab,el){document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  if(tab==='export')document.getElementById('dataTabContent').innerHTML=`<div class="card"><div class="card-header"><h3>📥 데이터 내보내기</h3></div><div class="card-body"><div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-outline w-full" onclick="handleExport('students')">👥 학생</button><button class="btn btn-outline w-full" onclick="handleExport('goals')">🎯 목표</button><button class="btn btn-outline w-full" onclick="handleExport('checks')">✅ 수행체크</button><button class="btn btn-outline w-full" onclick="handleExport('feedback')">💬 피드백</button><button class="btn btn-primary w-full" onclick="handleExport('all')">📦 전체</button></div></div></div>`;
  else renderDataManagement(document.getElementById('pageContent'));

function handleCSVUpload(input, type) {
  const file=input.files[0]; if(!file) return;
  Papa.parse(file, {
    header:true, encoding:'UTF-8', skipEmptyLines:true,
    complete: async function(results) {
      const data=results.data; const resultDiv=document.getElementById(type+'UploadResult');
      resultDiv.classList.remove('hidden');
      if(type==='student'){
        const students=data.map(row=>({name:row['이름']||row.name,grade:parseInt(row['학년']||row.grade),classNum:parseInt(row['반']||row.classNum||row.class),number:parseInt(row['번호']||row.number),email:row['이메일']||row.email||''})).filter(s=>s.name&&s.grade&&s.classNum&&s.number);
        resultDiv.innerHTML=`<p style="font-weight:600;margin-bottom:8px">📋 미리보기 (${students.length}명)</p><table class="data-table"><thead><tr><th>이름</th><th>학년</th><th>반</th><th>번호</th><th>이메일</th></tr></thead><tbody>${students.slice(0,10).map(s=>`<tr><td>${s.name}</td><td>${s.grade}</td><td>${s.classNum}</td><td>${s.number}</td><td>${s.email}</td></tr>`).join('')}${students.length>10?`<tr><td colspan="5" style="text-align:center;color:var(--text-light)">... 외 ${students.length-10}명</td></tr>`:''}</tbody></table><button class="btn btn-success w-full" style="margin-top:12px" onclick="confirmUpload('student',${JSON.stringify(students).replace(/'/g,"\\'")}')">✅ ${students.length}명 업로드 확정</button>`;
      } else {
        const teachers=data.map(row=>({id:row['교사ID']||row.id||'T'+String(Math.floor(Math.random()*900)+100),name:row['이름']||row.name,subject:row['담당과목']||row.subject||'',role:row['역할']||row.role||'멘토',email:row['이메일']||row.email||''})).filter(t=>t.name);
        resultDiv.innerHTML=`<p style="font-weight:600;margin-bottom:8px">📋 미리보기 (${teachers.length}명)</p><table class="data-table"><thead><tr><th>ID</th><th>이름</th><th>과목</th><th>역할</th></tr></thead><tbody>${teachers.map(t=>`<tr><td>${t.id}</td><td>${t.name}</td><td>${t.subject}</td><td>${t.role}</td></tr>`).join('')}</tbody></table><button class="btn btn-success w-full" style="margin-top:12px" onclick="confirmTeacherUpload()">✅ ${teachers.length}명 업로드 확정</button>`;
        window._pendingTeachers=teachers;
      }
      window._pendingStudents=type==='student'?data:null;
    }
  });
}
async function confirmUpload(type, data){showToast('업로드 중...','info');const r=await api('uploadStudents',{students:data},'POST');if(r.success){showToast(`${r.uploadedCount}명 업로드 완료!`,'success');navigateTo('students');}else showToast(r.error||'업로드 실패','error');}
async function confirmTeacherUpload(){if(!window._pendingTeachers)return;showToast('업로드 중...','info');const r=await api('uploadTeachers',{teachers:window._pendingTeachers},'POST');if(r.success)showToast(`${r.uploadedCount}명 업로드 완료!`,'success');else showToast(r.error||'실패','error');}
async function handleExport(type){showToast('내보내기 중...','info');const r=await api('exportData',{type});if(r.success){const blob=new Blob([JSON.stringify(r.data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`goal_${type}_${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(url);showToast('완료!','success');}}

function showGoalModal(){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>🎯 새 목표 추가</h3><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label>목표명 *</label><input type="text" id="goalTitle" placeholder="예: 영어 실력 향상"></div><div class="form-group"><label>상세 설명</label><textarea id="goalDesc" placeholder="구체적 설명"></textarea></div><div class="form-group"><label>영역</label><select id="goalCategory"><option value="학습">📚 학습</option><option value="생활">🏠 생활</option><option value="특기">⭐ 특기</option><option value="봉사">🤝 봉사</option><option value="기타">📌 기타</option></select></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveGoalFromModal()">저장</button></div></div></div>`;}
async function saveGoalFromModal(){const t=document.getElementById('goalTitle').value.trim();if(!t){showToast('목표명을 입력해 주세요','error');return;}const r=await api('saveGoal',{studentId:state.user.id,title:t,description:document.getElementById('goalDesc').value,category:document.getElementById('goalCategory').value},'POST');if(r.success){showToast('목표 저장!🎯','success');closeModal();navigateTo('goals');}}
function showActionModal(goalId){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>📋 실천과제 추가</h3><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label>과제명 *</label><input type="text" id="actionTitle" placeholder="예: 매일 영단어 20개"></div><div class="form-group"><label>설명</label><textarea id="actionDesc" placeholder="상세 설명"></textarea></div><div class="form-row"><div class="form-group"><label>주기</label><select id="actionFreq"><option value="매일">매일</option><option value="주 3회">주 3회</option><option value="주 1회">주 1회</option></select></div><div class="form-group"><label>목표 횟수</label><input type="number" id="actionTarget" value="30" min="1"></div></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveActionFromModal('${goalId}')">저장</button></div></div></div>`;}
async function saveActionFromModal(goalId){const t=document.getElementById('actionTitle').value.trim();if(!t){showToast('과제명 입력','error');return;}const r=await api('saveActionItem',{goalId,studentId:state.user.id,title:t,description:document.getElementById('actionDesc').value,frequency:document.getElementById('actionFreq').value,targetCount:document.getElementById('actionTarget').value},'POST');if(r.success){showToast('과제 추가!📋','success');closeModal();navigateTo('goals');}}
function showFeedbackModal(sid,sname){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>✍️ ${sname} 학생 피드백</h3><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label>유형</label><select id="modalFbType"><option value="격려">😊 격려</option><option value="조언">💡 조언</option><option value="점검">📋 점검</option></select></div><div class="form-group"><label>내용</label><textarea id="modalFbContent" rows="5" placeholder="피드백 내용..."></textarea></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="submitModalFeedback('${sid}')">전송</button></div></div></div>`;}
async function submitModalFeedback(sid){const content=document.getElementById('modalFbContent').value.trim();if(!content){showToast('내용 입력','error');return;}const r=await api('saveFeedback',{studentId:sid,teacherId:state.user.id,type:document.getElementById('modalFbType').value,content},'POST');if(r.success){showToast('피드백 전송!✉️','success');closeModal();}}
function closeModal(){document.getElementById('modalContainer').innerHTML='';}

// ========== Utility ==========
function toggleGoal(id){document.getElementById('goal-'+id)?.classList.toggle('expanded');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('mobileOverlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show');}
function updateDateDisplay(){document.getElementById('dateDisplay').textContent=formatDate(new Date());}
function formatDate(d){const days=['일','월','화','수','목','금','토'];return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;}
function showToast(msg,type='info'){const c=document.getElementById('toastContainer');const icons={success:'✅',error:'❌',info:'ℹ️'};const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span>${icons[type]||''}</span><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(30px)';setTimeout(()=>t.remove(),300);},3000);}

// ========== Init ==========
(function(){const saved=sessionStorage.getItem('user');if(saved){state.user=JSON.parse(saved);showApp();}})();
</script>
</body>
